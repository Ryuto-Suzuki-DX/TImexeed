services:
  db:
    image: postgres:16-alpine
    container_name: timexeed-db
    restart: unless-stopped
    env_file:
      - ./infra/env/postgres.prod.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - timexeed-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: "none"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: timexeed-backend
    restart: unless-stopped
    env_file:
      - ./infra/env/backend.prod.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    expose:
      - "8080"
    volumes:
      - ./secrets/google-service-account.json:/run/secrets/google-service-account.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - timexeed-internal
    logging:
      driver: "none"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    container_name: timexeed-frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - timexeed-internal
    logging:
      driver: "none"

  nginx:
    image: nginx:1.29-alpine
    container_name: timexeed-nginx
    restart: unless-stopped
    environment:
      TIMEXEED_DOMAIN: ${TIMEXEED_DOMAIN}
      NGINX_ENVSUBST_FILTER: TIMEXEED_DOMAIN
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - timexeed-internal
    logging:
      driver: "none"

networks:
  timexeed-internal:
    driver: bridge

volumes:
  postgres-data:
  certbot-webroot: