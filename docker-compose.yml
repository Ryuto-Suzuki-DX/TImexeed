services:
  db:
    image: postgres:16
    container_name: timexeed-db
    env_file:
      - ./infra/env/postgres.env
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: timexeed-backend
    ports:
      - "8080:8080"
    env_file:
      - ./infra/env/backend.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      TIMEXEED_MAIL_HOST: ${TIMEXEED_MAIL_HOST:-}
      TIMEXEED_MAIL_PORT: ${TIMEXEED_MAIL_PORT:-}
      TIMEXEED_MAIL_USERNAME: ${TIMEXEED_MAIL_USERNAME:-}
      TIMEXEED_MAIL_PASSWORD: ${TIMEXEED_MAIL_PASSWORD:-}
      TIMEXEED_MAIL_FROM: ${TIMEXEED_MAIL_FROM:-}
      TIMEXEED_MAIL_SENDER_NAME: ${TIMEXEED_MAIL_SENDER_NAME:-Timexeed}
      TIMEXEED_MAIL_SUBJECT_PREFIX: ${TIMEXEED_MAIL_SUBJECT_PREFIX:-[Timexeed]}
    volumes:
      - ./backend:/app
      - ./secrets/google-service-account.json:/run/secrets/google-service-account.json:ro
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: timexeed-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./infra/env/frontend.env
    environment:
      WATCHPACK_POLLING: true
      CHOKIDAR_USEPOLLING: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
