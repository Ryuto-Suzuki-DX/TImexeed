services:
  db:
    image: postgres:16
    container_name: timexeed-db
    environment:
      POSTGRES_USER: timexeed
      POSTGRES_PASSWORD: timexeedpass
      POSTGRES_DB: timexeed_db
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timexeed-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: timexeed
      DB_PASSWORD: timexeedpass
      DB_NAME: timexeed_db
      DB_SSLMODE: disable
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timexeed-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      WATCHPACK_POLLING: true
      CHOKIDAR_USEPOLLING: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data: