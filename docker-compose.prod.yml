services:
  db:
    image: postgres:16
    container_name: timexeed-db
    env_file:
      - ./infra/env/postgres.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timexeed-backend
    ports:
      - "8080:8080"
    env_file:
      - ./infra/env/backend.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./secrets/google-service-account.json:/run/secrets/google-service-account.json:ro
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timexeed-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./infra/env/frontend.env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data: